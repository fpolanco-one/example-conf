app_name: "DemoApp"
version: 1.2.3
is_production: false
max_connections: 150
timeout_seconds: 45.5

database:
  host: "localhost"
  port: 5432
  username: "admin"
  password: "SuperSecretPassword123!"

supported_formats:
  - "json"
  - "yaml"
  - "xml"
  - "csv"

allowed_ports: [80, 443, 8080]

environment_variables:
  - name: "NODE_ENV"
    value: "development"
  - name: "LOG_LEVEL"
    value: "debug"

welcome_message: |
  Welcome to DemoApp!
  -------------------
  Thank you for checking out this YAML file.
  Have a great day!

disclaimer: >
  This is a demonstration file intended for educational purposes only.
  It does not contain real production configurations or credentials.
